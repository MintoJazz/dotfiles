# ░█░█░█▀▀░█░█░█▀▀░█▀▄░█▀█░█░░░░░▀▀█░█▀▀░░█░░░█░░░█░░█░█░█░█░▀▀█
# ░▀▀▀░▀▀▀░▀░▀░▀▀▀░▀░▀░▀░▀░▀▀▀░░░▀▀▀░▀▀▀░░▀░░░▀░░▀▀▀░▀░▀░▀▀▀░▀▀▀

daemon = false;
backend = "glx"; # MANTIDO: "glx" é o backend mais performático se você tiver drivers de vídeo funcionando.
vsync = true;      # MANTIDO: Previne "screen tearing". Se notar lentidão (input lag), tente desativar (false).
dbus = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-client-opacity = true;

# OTIMIZAÇÃO: Ativar `unredir-if-possible` melhora muito a performance de aplicações
# em tela cheia (jogos, vídeos), pois desativa o compositor para elas.
unredir-if-possible = true;

detect-transient = true;
detect-client-leader = true;
resize-damage = 1;

# MANTIDO: `use-damage` é uma otimização importante, faz o picom redesenhar apenas as partes da tela que mudaram.
use-damage = true;

log-level = "warn";
show-all-xerrors = true;

wintypes: {
	tooltip = { fade = false; shadow = false; focus = false; };
	normal = { shadow = false; };
	dock = { shadow = false; };
	dnd = { shadow = false; };
	popup_menu = { shadow = false; focus = false; };
	dropdown_menu = { shadow = false; focus = false; };
	above = { shadow = false; }; # Desativado para performance
	splash = { shadow = false; };
	utility = { focus = false; shadow = false; blur-background = false; };
	notification = { shadow = false; };
	desktop = { shadow = false; blur-background = false; };
	menu = { focus = false; };
	dialog = { shadow = false; }; # Desativado para performance
};
